name: Build + Release

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Linux 64-bit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux build tools
        run: sudo apt update && sudo apt install -y cmake gcc g++ make zip

      - name: Build Linux 64-bit
        run: |
          chmod +x ./clean.sh ./build-lin64.sh
          ./clean.sh
          ./build-lin64.sh

      - name: Package Linux artifacts
        run: |
          cp release/*.so 3zb2/
          zip -r 3zb2-linux64.zip 3zb2/

      - uses: actions/upload-artifact@v6
        with:
          name: linux64-build
          path: 3zb2-linux64.zip

  build-win32:
    name: Windows 32-bit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >
            base-devel
            zip
            mingw-w64-i686-toolchain
            mingw-w64-i686-zlib
            mingw-w64-i686-ffmpeg
            mingw-w64-i686-libpng
            mingw-w64-i686-libjpeg-turbo
            mingw-w64-i686-openal
            mingw-w64-i686-zstd

      - name: Build Windows 32-bit
        shell: msys2 {0}
        run: |
          chmod +x ./clean.sh ./build-win32.sh
          ./clean.sh
          ./build-win32.sh
          cp release/*.dll 3zb2/
          zip -r 3zb2-win32.zip 3zb2/

      - uses: actions/upload-artifact@v6
        with:
          name: win32-build
          path: 3zb2-win32.zip

  build-win64:
    name: Windows 64-bit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            base-devel
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-zstd

      - name: Build Windows 64-bit
        shell: msys2 {0}
        run: |
          chmod +x ./clean.sh ./build-win64.sh
          ./clean.sh
          ./build-win64.sh
          cp release/*.dll 3zb2/
          zip -r 3zb2-win64.zip 3zb2/

      - uses: actions/upload-artifact@v6
        with:
          name: win64-build
          path: 3zb2-win64.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-win32, build-win64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Verify artifacts
        run: ls -R release-assets

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            release-assets/linux64-build/3zb2-linux64.zip \
            release-assets/win32-build/3zb2-win32.zip \
            release-assets/win64-build/3zb2-win64.zip \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
