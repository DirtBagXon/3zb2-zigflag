name: Build + Release

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}

jobs:
  generate-config:
    name: Generate CONFIG.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: sudo apt update && sudo apt install -y pandoc

      - name: Convert CONFIG.md to CONFIG.txt
        run: pandoc CONFIG.md -t plain --ascii -o CONFIG.txt

      - uses: actions/upload-artifact@v6
        with:
          name: config-text
          path: CONFIG.txt

  build-linux:
    name: Linux 64-bit
    runs-on: ubuntu-latest
    needs: generate-config
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: config-text
          path: .

      - name: Install Linux build tools
        run: sudo apt update && sudo apt install -y cmake gcc g++ make zip

      - name: Build Linux 64-bit
        run: |
          chmod +x ./clean.sh ./build-lin64.sh
          ./clean.sh
          ./build-lin64.sh

      - name: Package Linux artifacts
        run: |
          cp release/*.so 3zb2/
          echo "3zb2 build version: $VERSION" > INSTALL.txt
          echo "" >> INSTALL.txt
          echo "Rename the game.so to your Quake II engine’s expected filename." >> INSTALL.txt
          zip -r 3zb2-linux64-$VERSION.zip 3zb2/ INSTALL.txt CONFIG.txt

      - uses: actions/upload-artifact@v6
        with:
          name: linux64-build
          path: 3zb2-linux64-${{ env.VERSION }}.zip

  build-macos:
    name: MacOS 64-bit
    runs-on: macos-latest
    needs: generate-config
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: config-text
          path: .

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
        if: success()

      - name: Install Dependencies
        run: |
          brew install make
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Build Mac 64-bit
        run: |
          chmod +x ./clean.sh ./build-mac64.sh
          ./clean.sh
          ./build-mac64.sh

      - name: Package Mac artifacts
        run: |
          cp release/*.dylib 3zb2/
          echo "3zb2 build version: $VERSION" > INSTALL.txt
          echo "" >> INSTALL.txt
          echo "Rename the dylib to your Quake II engine’s expected filename." >> INSTALL.txt
          zip -r 3zb2-mac64-$VERSION.zip 3zb2/ INSTALL.txt CONFIG.txt

      - uses: actions/upload-artifact@v6
        with:
          name: mac64-build
          path: 3zb2-mac64-${{ env.VERSION }}.zip

  build-win32:
    name: Windows 32-bit
    runs-on: windows-latest
    needs: generate-config
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: config-text
          path: .

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >
            base-devel
            zip
            mingw-w64-i686-toolchain
            mingw-w64-i686-zlib
            mingw-w64-i686-ffmpeg
            mingw-w64-i686-libpng
            mingw-w64-i686-libjpeg-turbo
            mingw-w64-i686-openal
            mingw-w64-i686-zstd

      - name: Build Windows 32-bit
        shell: msys2 {0}
        run: |
          chmod +x ./clean.sh ./build-win32.sh
          ./clean.sh
          ./build-win32.sh
          cp release/*.dll 3zb2/
          echo "3zb2 build version: $VERSION" > INSTALL.txt
          echo "" >> INSTALL.txt
          echo "Rename the DLL to your Quake II engine’s expected filename." >> INSTALL.txt
          zip -r 3zb2-win32-$VERSION.zip 3zb2/ INSTALL.txt CONFIG.txt

      - uses: actions/upload-artifact@v6
        with:
          name: win32-build
          path: 3zb2-win32-${{ env.VERSION }}.zip

  build-win64:
    name: Windows 64-bit
    runs-on: windows-latest
    needs: generate-config
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: config-text
          path: .

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            base-devel
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-zstd

      - name: Build Windows 64-bit
        shell: msys2 {0}
        run: |
          chmod +x ./clean.sh ./build-win64.sh
          ./clean.sh
          ./build-win64.sh
          cp release/*.dll 3zb2/
          echo "3zb2 build version: $VERSION" > INSTALL.txt
          echo "" >> INSTALL.txt
          echo "Rename the DLL to your Quake II engine’s expected filename." >> INSTALL.txt
          zip -r 3zb2-win64-$VERSION.zip 3zb2/ INSTALL.txt CONFIG.txt

      - uses: actions/upload-artifact@v6
        with:
          name: win64-build
          path: 3zb2-win64-${{ env.VERSION }}.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-win32, build-win64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Verify artifacts
        run: ls -R release-assets

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            release-assets/linux64-build/3zb2-linux64-${{ env.VERSION }}.zip \
            release-assets/mac64-build/3zb2-mac64-${{ env.VERSION }}.zip \
            release-assets/win32-build/3zb2-win32-${{ env.VERSION }}.zip \
            release-assets/win64-build/3zb2-win64-${{ env.VERSION }}.zip \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
